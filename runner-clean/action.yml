name: "Runner setup and cleaning"
author: "Igor Pecovnik"
description: "Configure self hosted runner proxies/caches and clean its workspace"
runs:
  using: "composite"
  steps:

      - name: "Runner info for ${{ runner.name }}"
        shell: bash
        run: |
          info="$(curl -fsSL "https://github.armbian.com/servers/github-runners.jq" \
            | jq --arg name "${{ runner.name }}" '
                ($name | sub("-[0-9]+$"; "")) as $base
                | first(.[] | select((.host | split(".")[0]) == $base)) // {}
              ')"
          echo "Runner info for ${{ runner.name }}:"
          echo "$info"
          echo "--- Exported environment ---"
          for map in apt_proxy:APT_PROXY_ADDR oci_cache:GHCR_MIRROR_ADDRESS redis_cache:CCACHE_REMOTE_STORAGE; do
            key="${map%%:*}"; var="${map##*:}"
            value="$(jq -r --arg k "$key" '.[$k] // ""' <<< "$info")"
            echo "${var}=${value}"
            echo "${var}=${value}" >> "$GITHUB_ENV"
          done

          # Clear a stale generic proxy on runners that advertise NO apt proxy.
          # Such a leftover (e.g. a datacenter http_proxy a host grep won't find)
          # leaks into builds — docker.sh forwards http_proxy into the build
          # container, and apt there points at an unreachable cache (e.g.
          # 10.0.40.2:3142) and times out. Clear it via $GITHUB_ENV so it can't.
          # Runners that DO advertise a proxy are left untouched: apt uses
          # APT_PROXY_ADDR and git uses git_proxy. The apt-cacher-ng address is
          # apt-only and must NOT become the generic http(s)_proxy (acng can't
          # proxy general HTTPS like ghcr.io/github.com).
          apt_proxy="$(jq -r '.apt_proxy // ""' <<< "$info")"
          if [[ -z "$apt_proxy" ]]; then
            for v in http_proxy https_proxy HTTP_PROXY HTTPS_PROXY; do
              echo "${v}="
              echo "${v}=" >> "$GITHUB_ENV"
            done
          fi

          # git proxy: route github.com through the local git_cdn mirror.
          # Clear any previous rewrite first (the proxy may have changed or been
          # dropped in NetBox); ~/.gitconfig persists on the machine otherwise.
          while read -r key _; do
            git config --global --unset-all "$key" '^https://github\.com/$' 2>/dev/null || true
          done < <(git config --global --get-regexp '\.insteadof$' 2>/dev/null | grep -i 'https://github.com/$' | awk '{print $1}')

          git_proxy="$(jq -r '.git_proxy // ""' <<< "$info")"
          if [[ -n "$git_proxy" ]]; then
            # insteadOf replaces the 'https://github.com/' prefix (trailing
            # slash included), so the proxy base must end in exactly one slash
            # — otherwise host:port glues onto the path (':8000armbian/...').
            git_proxy="${git_proxy%/}/"
            echo "git config --global url.\"${git_proxy}\".insteadOf https://github.com/"
            git config --global url."${git_proxy}".insteadOf https://github.com/
          fi

          # Per-runner xz memory cap: 70% of host RAM split across its runners,
          # leaving headroom for the OS and the build itself. Consumed by the
          # build's `xz --memlimit-compress` (overrides its 10 GiB default).
          mem_mb="$(jq -r '.memory // 0' <<< "$info")"
          n_runners="$(jq -r '.runners // 0' <<< "$info")"
          if (( mem_mb > 0 && n_runners > 0 )); then
            xz_cap_mb=$(( mem_mb * 7 / 10 / n_runners ))
            echo "IMAGE_XZ_MEMLIMIT=${xz_cap_mb}MiB"
            echo "IMAGE_XZ_MEMLIMIT=${xz_cap_mb}MiB" >> "$GITHUB_ENV"
          fi

      - name: "Remove JSON files"
        if: ${{ env.RUNNER_USER != 'runner' }}
        shell: bash
        run: |
          sudo rm -rf JSON *.json *.tmp *.parts

      - name: "Remove output folder"
        if: ${{ env.RUNNER_USER != 'runner' }}
        shell: bash
        run: |
          # clean toolchain/rootfs/sources and debs only if usage goes over 90% (arbitrary)
          if [[ $(df --total -hl --output=pcent | tail -1 | xargs | sed "s/%//g") -gt 90 ]]; then
              sudo rm -rf cache/toolchain/*
              sudo rm -rf cache/rootfs/*
              sudo rm -rf build/cache/toolchain/*
              sudo rm -rf build/cache/rootfs/*
              sudo rm -rf cache/sources/*
              sudo rm -rf build/cache/sources/*
              sudo rm -rf output/{debs,debs-beta}/*
              sudo rm -rf build/output/{debs,debs-beta}/*
          fi
          sudo rm -rf output/images/*
          sudo rm -rf userpatches/*
          sudo rm -rf build/output/images/*
          sudo rm -rf build/userpatches/*

      - name: "Fix permissions"
        if: ${{ env.RUNNER_USER != 'runner' }}
        shell: bash
        run: |
          # Docker/chroot build steps leave some files under the workspace owned
          # by root (e.g. cache/aptcache/lists). actions/checkout's pre-checkout
          # "Deleting the contents of ..." runs as the runner user (no sudo) and
          # then fails with: EACCES: permission denied, rmdir '.../cache/aptcache/lists'.
          # Chown those back to the runner user — but *selectively*: only files
          # NOT already owned by this user/group, so we skip the vast majority of
          # correctly-owned files instead of a full recursive chown of a multi-GB
          # workspace on every run (which is why the blanket chown was dropped).
          me_u="$(id -un)"; me_g="$(id -gn)"
          sudo find . \( ! -user "$me_u" -o ! -group "$me_g" \) -exec chown "${me_u}:${me_g}" {} + 2> /dev/null || true

          sudo rm -f lib/tools/common/__pycache__/bash_declare_parser.cpython-310.pyc 2> /dev/null || true

      - name: "Register qemu binfmt handlers"
        if: ${{ env.RUNNER_USER != 'runner' }}
        shell: bash
        run: |
          # Cross-arch (container) rootfs builds need qemu-user binfmt_misc
          # handlers registered on the HOST kernel. The build's in-container
          # `update-binfmts --enable` only *enables* handlers already present in
          # the host binfmt database, so a runner that was never set up by hand
          # fails at prepare_host_binfmt_qemu, e.g.:
          #   Failed to update binfmts  update-binfmts --enable qemu-aarch64
          # Register them here so every runner works without manual per-host setup.
          set -euo pipefail
          if ! dpkg -s qemu-user-static > /dev/null 2>&1 || ! dpkg -s binfmt-support > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends qemu-user-static binfmt-support
          fi
          # binfmt_misc must be mounted for the registrations to stick.
          sudo mountpoint -q /proc/sys/fs/binfmt_misc \
            || sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
          # Import + enable all packaged qemu handlers (idempotent). The F
          # (fix-binary) flag comes from qemu-user-static's binfmt definitions,
          # so the handlers keep working inside the build container.
          sudo update-binfmts --import 2> /dev/null || true
