# AI-driven README updater (central, cross-repo).
#
# Runs update-readme/generate_readme.py against one or more target repositories:
# checks each out, (re)generates its README.md with Claude from the repo's own
# files, and opens a pull request there. Never pushes to a default branch, never
# edits anything but README.md. peter-evans/create-pull-request makes no PR when
# the generated README is byte-identical to the current one, so re-runs are cheap.
#
# Secrets required on this repo (armbian/actions):
#   ANTHROPIC_API_KEY  - Claude API key (same one the reporting workflows use)
#   ACCESS_TOKEN       - PAT with `repo` scope on the target repos (the builtin
#                        GITHUB_TOKEN cannot push branches / open PRs cross-repo)
name: "Update README (AI)"

on:
  workflow_dispatch:
    inputs:
      repos:
        description: "Comma-separated owner/repo targets (default: core repos)"
        required: false
        default: "armbian/build,armbian/configng,armbian/ci,armbian/imager,armbian/documentation"
      model:
        description: "Claude model id"
        required: false
        default: "claude-opus-4-7"
  schedule:
    - cron: "20 5 * * MON"   # weekly, Mondays 05:20 UTC

concurrency:
  group: update-readme
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: "Resolve target list"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          repos="${{ github.event.inputs.repos || 'armbian/build,armbian/configng,armbian/ci,armbian/imager,armbian/documentation' }}"
          matrix="$(echo "$repos" | tr ',' '\n' | sed 's/[[:space:]]//g' | grep -v '^$' | jq -R . | jq -s -c .)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Targets: $matrix"

  update:
    name: "README: ${{ matrix.repo }}"
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout tooling (this repo)
        uses: actions/checkout@v7
        with:
          path: tooling

      - name: Checkout target repository
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.ACCESS_TOKEN }}
          path: target
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        run: pip install 'anthropic>=0.40.0'

      - name: Generate README
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: ${{ github.event.inputs.model || 'claude-opus-4-7' }}
        run: |
          python3 tooling/update-readme/generate_readme.py \
            --repo-dir target \
            --repo-name "${{ matrix.repo }}"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          path: target
          branch: chore/update-readme
          delete-branch: true
          commit-message: "docs: refresh README (AI-assisted)"
          title: "docs: refresh README (AI-assisted)"
          labels: documentation
          body: |
            Automated README refresh generated by the **Update README (AI)** workflow in
            [`armbian/actions`](https://github.com/armbian/actions/blob/main/.github/workflows/update-readme.yml).

            The content is generated by Claude from this repository's own files (file tree,
            manifests, workflows, existing README). **Please review for accuracy** before
            merging — edit or close if anything is wrong. Re-running the workflow refreshes
            this branch.
